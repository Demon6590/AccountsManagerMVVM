services:
  postgres:
    container_name: user_postgres
    image: postgres:18.4
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U admin -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
  
  migrations:
    container_name: test_migrations
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations

    command: -path=/migrations -database "postgres://admin:1234@postgres:5432/user_db?sslmode=disable" up
    depends_on:
      postgres:
        condition: service_healthy